<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TheDelinquant-Devteam</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d0f;
      color: #e8e0d0;
      font-family: 'Crimson Text', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    .brand {
      text-align: center;
      margin-bottom: 64px;
    }

    .brand h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      letter-spacing: 0.12em;
      color: #c9a84c;
      text-shadow: 0 0 40px rgba(201,168,76,0.3);
      line-height: 1.2;
    }

    .brand .separator {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a84c, transparent);
      margin: 18px auto;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #7a6a50;
      margin-bottom: 28px;
      text-align: center;
    }

    .app-card {
      background: #16141a;
      border: 1px solid #2e2a20;
      border-radius: 12px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      max-width: 480px;
      width: 100%;
      text-decoration: none;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
      margin-bottom: 64px;
    }

    .app-card:hover {
      border-color: #c9a84c;
      box-shadow: 0 0 32px rgba(201,168,76,0.1);
      transform: translateY(-2px);
    }

    .app-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      border: 1px solid #2e2a20;
      object-fit: cover;
      flex-shrink: 0;
      background: #1e1b26;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #5a5040;
      text-align: center;
      line-height: 1.3;
    }

    .app-info {
      flex: 1;
    }

    .app-name {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      color: #e8e0d0;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .app-cta {
      font-size: 0.85rem;
      color: #c9a84c;
      letter-spacing: 0.05em;
    }

    .app-arrow {
      color: #5a5040;
      font-size: 1.4rem;
      transition: color 0.2s, transform 0.2s;
    }

    .app-card:hover .app-arrow {
      color: #c9a84c;
      transform: translateX(4px);
    }

    .contact-section {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .contact-email {
      font-size: 1.1rem;
      color: #9a8a6a;
      font-style: italic;
    }

    .contact-email a {
      color: #c9a84c;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-email a:hover {
      color: #e8c870;
    }

    footer {
      margin-top: 80px;
      font-size: 0.75rem;
      color: #3a3530;
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="brand">
    <h1>TheDelinquant-Devteam</h1>
    <div class="separator"></div>
  </div>

  <p class="section-title">Applications</p>

  <a class="app-card" href="https://play.google.com/store/apps/details?id=com.thedelinquant.raidthedungeonking" target="_blank" rel="noopener">
    <img class="app-icon" src="icon.png" alt="Raid the Dungeon King"/>
    <div class="app-info">
      <p class="app-name">Raid the Dungeon King</p>
      <p class="app-cta">Voir sur Google Play</p>
    </div>
    <span class="app-arrow">›</span>
  </a>

	
  <footer>© 2026 TheDelinquant-Devteam</footer>

</body>
</html>
